<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance RAG Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .upload-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .file-input-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type="file"] {
            display: none;
        }

        .file-input-label {
            display: block;
            padding: 15px 20px;
            background: #667eea;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            transition: background 0.3s;
            font-weight: 500;
        }

        .file-input-label:hover {
            background: #764ba2;
        }

        .file-name {
            margin-top: 10px;
            color: #666;
            font-size: 0.95em;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 500;
            transition: background 0.3s;
            margin-top: 15px;
        }

        button:hover {
            background: #764ba2;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .status {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .status.loading {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        .question-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .answer-section {
            margin-top: 30px;
        }

        .answer-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            margin-bottom: 20px;
        }

        .answer-box h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .answer-text {
            color: #555;
            line-height: 1.6;
            font-size: 1.05em;
        }

        .sources-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #764ba2;
        }

        .sources-box h3 {
            color: #333;
            margin-bottom: 15px;
        }

        .source-item {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
            color: #666;
            font-size: 0.95em;
            line-height: 1.5;
        }

        .source-item:last-child {
            margin-bottom: 0;
        }

        .hidden {
            display: none;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            font-size: 1.05em;
        }

        /* Modal Styles */
        .modal {
            display: flex;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .modal-content h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.8em;
        }

        .modal-content p {
            color: #666;
            margin-bottom: 25px;
            font-size: 1em;
        }

        .auth-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }

        .auth-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .auth-button {
            width: 100%;
            background: #667eea;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 500;
            transition: background 0.3s;
        }

        .auth-button:hover {
            background: #764ba2;
        }

        #authStatus {
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 Finance RAG Assistant</h1>
            <p>Upload your bank statement and ask questions about it</p>
        </header>

        <!-- Auth Modal -->
        <div id="authModal" class="modal">
            <div class="modal-content">
                <h2>🔐 Authentication Required</h2>
                <p>Please enter the access key to continue</p>
                <input 
                    type="password" 
                    id="authInput" 
                    placeholder="Enter access key"
                    class="auth-input"
                />
                <button onclick="authenticate()" class="auth-button">Access</button>
                <div class="status" id="authStatus"></div>
            </div>
        </div>

        <!-- Main Content (hidden until authenticated) -->
        <div id="mainContent" class="hidden">

        <!-- Upload Section -->
        <div class="card upload-section">
            <h2>Step 1: Upload Your Bank Statement</h2>
            <div class="file-input-wrapper">
                <input type="file" id="pdfFile" accept=".pdf" />
                <label for="pdfFile" class="file-input-label">
                    📄 Choose PDF File
                </label>
                <div class="file-name" id="fileName"></div>
            </div>
            <button id="uploadBtn" onclick="uploadPDF()" disabled>Upload & Process</button>
            <div class="status" id="uploadStatus"></div>
        </div>

        <!-- Question Section -->
        <div class="card question-section">
            <h2>Step 2: Ask Questions</h2>
            <div class="input-group">
                <input 
                    type="text" 
                    id="questionInput" 
                    placeholder="e.g., What was my closing balance?"
                    disabled
                />
                <button id="askBtn" onclick="askQuestion()" disabled>Ask</button>
            </div>
            <div class="status" id="questionStatus"></div>

            <!-- Answer Display -->
            <div id="answerSection" class="answer-section hidden">
                <div class="answer-box">
                    <h3>Answer:</h3>
                    <div class="answer-text" id="answerText"></div>
                </div>

                <div class="sources-box">
                    <h3>📚 Source Documents:</h3>
                    <div id="sourcesList"></div>
                </div>
            </div>

            <div id="emptyState" class="empty-state">
                Upload a PDF first to start asking questions.
            </div>
        </div>
        </div>
    </div>

    <script>
        let documentUploaded = false;
        let authToken = null;

        // Check if already authenticated
        window.addEventListener('load', function() {
            authToken = localStorage.getItem('authToken');
            if (authToken) {
                document.getElementById('authModal').style.display = 'none';
                document.getElementById('mainContent').classList.remove('hidden');
            } else {
                document.getElementById('authModal').style.display = 'flex';
            }
        });

        // Allow Enter key for auth
        document.getElementById('authInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                authenticate();
            }
        });

        async function authenticate() {
            const input = document.getElementById('authInput').value.trim();
            if (!input) {
                showStatus('authStatus', 'Please enter the access key', 'error');
                return;
            }

            authToken = input;
            localStorage.setItem('authToken', authToken);
            
            document.getElementById('authModal').style.display = 'none';
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('authInput').value = '';
        }

        document.getElementById('pdfFile').addEventListener('change', function(e) {
            const fileName = e.target.files[0]?.name || '';
            document.getElementById('fileName').textContent = fileName ? `Selected: ${fileName}` : '';
            document.getElementById('uploadBtn').disabled = !fileName;
        });

        async function uploadPDF() {
            const fileInput = document.getElementById('pdfFile');
            const file = fileInput.files[0];

            if (!file) {
                showStatus('uploadStatus', 'Please select a PDF file', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            showStatus('uploadStatus', 'Uploading and processing...', 'loading');
            document.getElementById('uploadBtn').disabled = true;

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    showStatus('uploadStatus', `✓ ${data.message}`, 'success');
                    documentUploaded = true;
                    document.getElementById('questionInput').disabled = false;
                    document.getElementById('askBtn').disabled = false;
                    document.getElementById('emptyState').classList.add('hidden');
                    fileInput.disabled = true;
                } else {
                    showStatus('uploadStatus', `Error: ${data.detail}`, 'error');
                    document.getElementById('uploadBtn').disabled = false;
                }
            } catch (error) {
                showStatus('uploadStatus', `Error: ${error.message}`, 'error');
                document.getElementById('uploadBtn').disabled = false;
            }
        }

        async function askQuestion() {
            const question = document.getElementById('questionInput').value.trim();

            if (!question) {
                showStatus('questionStatus', 'Please enter a question', 'error');
                return;
            }

            if (!documentUploaded) {
                showStatus('questionStatus', 'Please upload a document first', 'error');
                return;
            }

            showStatus('questionStatus', 'Thinking...', 'loading');
            document.getElementById('askBtn').disabled = true;

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({ question })
                });

                const data = await response.json();

                if (response.ok) {
                    showStatus('questionStatus', '', '');
                    displayAnswer(data.answer, data.sources);
                    document.getElementById('questionInput').value = '';
                } else {
                    showStatus('questionStatus', `Error: ${data.detail}`, 'error');
                }
            } catch (error) {
                showStatus('questionStatus', `Error: ${error.message}`, 'error');
            } finally {
                document.getElementById('askBtn').disabled = false;
            }
        }

        function displayAnswer(answer, sources) {
            document.getElementById('answerText').textContent = answer;
            
            const sourcesList = document.getElementById('sourcesList');
            sourcesList.innerHTML = '';
            
            sources.forEach((source, index) => {
                const sourceDiv = document.createElement('div');
                sourceDiv.className = 'source-item';
                sourceDiv.textContent = source.substring(0, 300) + (source.length > 300 ? '...' : '');
                sourcesList.appendChild(sourceDiv);
            });

            document.getElementById('answerSection').classList.remove('hidden');
        }

        function showStatus(elementId, message, type) {
            const statusEl = document.getElementById(elementId);
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
        }

        // Allow Enter key to submit question
        document.getElementById('questionInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !document.getElementById('askBtn').disabled) {
                askQuestion();
            }
        });
    </script>
</body>
</html>
