<!DOCTYPE html>
<html>
<head>
    <title>Finance RAG</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 20px; background: #f5f5f5; }
        h1 { color: #333; }
        h2 { color: #555; margin-top: 20px; }
        input, button { padding: 8px; margin: 5px 0; font-size: 14px; }
        input[type="file"], input[type="text"] { width: 100%; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; }
        .status { margin: 10px 0; padding: 10px; border-radius: 3px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .result { background: white; padding: 15px; margin: 15px 0; border-radius: 3px; }
        pre { background: #f0f0f0; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Finance RAG</h1>
    
    <h2>Upload PDF</h2>
    <input type="file" id="pdf" accept=".pdf" />
    <button onclick="upload()">Upload</button>
    <div id="uploadStatus"></div>

    <h2>Ask Question</h2>
    <input type="text" id="query" placeholder="Enter your question" />
    <button onclick="ask()">Ask</button>
    <div id="queryStatus"></div>

    <div id="answer" style="display:none;" class="result">
        <h3>Answer:</h3>
        <p id="answerText"></p>
        <h3>Sources:</h3>
        <div id="sources"></div>
    </div>

    <script>
        let uploaded = false;

        async function upload() {
            const file = document.getElementById('pdf').files[0];
            if (!file) return alert('Select a PDF');

            const form = new FormData();
            form.append('file', file);
            
            document.getElementById('uploadStatus').textContent = 'Uploading...';
            
            try {
                const res = await fetch('/upload', { method: 'POST', body: form });
                const data = await res.json();
                
                if (res.ok) {
                    document.getElementById('uploadStatus').textContent = data.message;
                    document.getElementById('uploadStatus').className = 'status success';
                    uploaded = true;
                } else {
                    document.getElementById('uploadStatus').textContent = data.detail;
                    document.getElementById('uploadStatus').className = 'status error';
                }
            } catch (e) {
                document.getElementById('uploadStatus').textContent = e.message;
                document.getElementById('uploadStatus').className = 'status error';
            }
        }

        async function ask() {
            const q = document.getElementById('query').value.trim();
            if (!q) return alert('Enter a question');
            if (!uploaded) return alert('Upload a PDF first');

            document.getElementById('queryStatus').textContent = 'Thinking...';
            
            try {
                const res = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: q })
                });
                
                const data = await res.json();
                if (res.ok) {
                    document.getElementById('answerText').textContent = data.answer;
                    document.getElementById('sources').innerHTML = data.sources.map(s => 
                        '<pre>' + s.substring(0, 200) + '...</pre>'
                    ).join('');
                    document.getElementById('answer').style.display = 'block';
                    document.getElementById('queryStatus').textContent = '';
                } else {
                    document.getElementById('queryStatus').textContent = data.detail;
                    document.getElementById('queryStatus').className = 'status error';
                }
            } catch (e) {
                document.getElementById('queryStatus').textContent = e.message;
                document.getElementById('queryStatus').className = 'status error';
            }
        }

        document.getElementById('query').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') ask();
        });
    </script>
</body>
</html>
